# Salesforce OAuth credentials for the Camel Salesforce Kafka Connector.
# Fill in your values and apply before deploying the SF source connector.
#
# How to get these values:
#   1. In Salesforce Setup → App Manager → New Connected App
#   2. Enable OAuth, add scopes: api, refresh_token, offline_access
#   3. clientId   = Consumer Key
#      clientSecret = Consumer Secret
#      username   = your Salesforce login email
#      password   = password + security token (concatenated, no space)
#                   Get security token: Setup → My Personal Information → Reset Security Token
#
# For sandbox, change loginUrl to https://test.salesforce.com
apiVersion: v1
kind: Secret
metadata:
  name: sf-credentials
  namespace: kafka
type: Opaque
stringData:
  clientId: "YOUR_CONNECTED_APP_CONSUMER_KEY"
  clientSecret: "YOUR_CONNECTED_APP_CONSUMER_SECRET"
  username: "your@email.com"
  password: "YourPasswordYourSecurityToken"
  loginUrl: "https://login.salesforce.com"
