# Salesforce CDC Source Connector (via Apache Camel Salesforce Kafka Connector)
#
# Subscribes to Salesforce Change Data Capture events for a specific object and
# publishes each event as a Kafka message on topic: sf.<ObjectName>ChangeEvent
#
# Salesforce prereqs (do once in Salesforce Setup):
#   Setup → Integrations → Change Data Capture → move the target object to Selected
#   e.g. enable "Account" to get /data/AccountChangeEvent events
#
# To track a different object, change:
#   camel.source.endpoint.topicName  →  /data/<YourObject>ChangeEvent
#   kafka.topic                      →  sf.<YourObject>ChangeEvent
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: sf-source
  namespace: kafka
  labels:
    strimzi.io/cluster: debezium-connect
spec:
  class: org.apache.camel.kafkaconnector.salesforce.CamelSalesforceSourceConnector
  tasksMax: 1
  config:
    # Target Kafka topic
    kafka.topic: sf.AccountChangeEvent

    # Salesforce Streaming API channel for Account CDC events
    camel.source.path.operationName: subscribe
    camel.source.endpoint.topicName: /data/AccountChangeEvent
    # rawPayload=true → value is plain JSON string (easier to inspect and sink)
    camel.source.endpoint.rawPayload: "true"

    # OAuth credentials — resolved from env vars mounted by externalConfiguration in KafkaConnect
    camel.component.salesforce.clientId: "${env:SF_CLIENT_ID}"
    camel.component.salesforce.clientSecret: "${env:SF_CLIENT_SECRET}"
    camel.component.salesforce.userName: "${env:SF_USERNAME}"
    camel.component.salesforce.password: "${env:SF_PASSWORD}"
    camel.component.salesforce.loginUrl: "https://login.salesforce.com"

    # Use schemaless JSON — Salesforce CDC events don't carry a Kafka Connect schema
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: org.apache.kafka.connect.storage.StringConverter
