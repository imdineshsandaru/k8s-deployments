# Kafka cluster — KRaft mode (no ZooKeeper), single node for local dev
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: cdc-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # Single replica config for local dev
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      # Required Kafka Connect internal topics
      num.partitions: 1
  # Entity Operator manages KafkaTopic and KafkaUser CRs
  entityOperator:
    topicOperator: {}
    userOperator: {}
