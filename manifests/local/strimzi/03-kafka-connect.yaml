apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: debezium-connect
  namespace: kafka
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 4.2.0
  replicas: 1
  bootstrapServers: cdc-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092

  # Strimzi builds the image itself — downloads Debezium JARs and pushes to GHCR
  build:
    output:
      type: docker
      image: ghcr.io/imdineshsandaru/debezium-connect:pg-2.7.3-jdbc-3.0.6-sf-0.11.5-v2
      pushSecret: ghcr-secret
    plugins:
      - name: debezium-postgres-connector
        artifacts:
          - type: tgz
            url: https://repo1.maven.org/maven2/io/debezium/debezium-connector-postgres/2.7.3.Final/debezium-connector-postgres-2.7.3.Final-plugin.tar.gz
      - name: debezium-jdbc-sink
        artifacts:
          - type: tgz
            # Debezium 3.x is required for Kafka 4.x — rewrote sink to use public Connect API
            # (2.7.x used InternalSinkRecord.originalRecord() which was removed in Kafka 4.0)
            url: https://repo1.maven.org/maven2/io/debezium/debezium-connector-jdbc/3.0.6.Final/debezium-connector-jdbc-3.0.6.Final-plugin.tar.gz
      - name: camel-salesforce-connector
        artifacts:
          - type: tgz
            # Source-only connector — uses public SourceRecord API, safe on Kafka 4.x
            # Latest version: https://repo1.maven.org/maven2/org/apache/camel/kafkaconnector/camel-salesforce-kafka-connector/
            url: https://repo1.maven.org/maven2/org/apache/camel/kafkaconnector/camel-salesforce-kafka-connector/0.11.5/camel-salesforce-kafka-connector-0.11.5-package.tar.gz
          - type: jar
            # Kafka 4.x InstantiableClassValidator checks the default key.converter (JsonConverter)
            # against the plugin's isolated classloader at config-definition time.
            # Bundling connect-json into the plugin directory makes it visible to that classloader.
            url: https://repo1.maven.org/maven2/org/apache/kafka/connect-json/4.2.0/connect-json-4.2.0.jar

  config:
    group.id: cdc-connect-cluster
    # Allow connector configs to reference env vars as ${env:VAR_NAME}
    config.providers: env
    config.providers.env.class: org.apache.kafka.common.config.provider.EnvVarConfigProvider
    offset.storage.topic: connect-offsets
    config.storage.topic: connect-configs
    status.storage.topic: connect-statuses
    config.storage.replication.factor: 1
    offset.storage.replication.factor: 1
    status.storage.replication.factor: 1
    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: true
    value.converter.schemas.enable: true
    # Kafka 4.x uses strict plugin classloader isolation by default (service_load).
    # hybrid_warn falls back to scanning so connectors can see built-in converter classes.
    plugin.discovery: hybrid_warn

  # Mount Salesforce credentials from Secret as env vars so connectors can use ${env:SF_*}
  externalConfiguration:
    env:
      - name: SF_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: sf-credentials
            key: clientId
      - name: SF_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: sf-credentials
            key: clientSecret
      - name: SF_USERNAME
        valueFrom:
          secretKeyRef:
            name: sf-credentials
            key: username
      - name: SF_PASSWORD
        valueFrom:
          secretKeyRef:
            name: sf-credentials
            key: password

  template:
    pod:
      imagePullSecrets:
        - name: ghcr-secret     # needed to pull the built image back

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi