# Metabase – local environment overrides
# Metabase stores its own application state (users, dashboards, questions …)
# in a dedicated database on the postgresql-sink instance.
# metabasedb is created by postgresql-sink's initdb script.

database:
  type: postgres
  host: postgresql-sink.postgresql-sink.svc.cluster.local
  port: 5432
  dbname: metabasedb
  username: metabaseuser
  password: metabasepass

# Expose Metabase via NodePort so it is reachable from the host machine
# without needing an Ingress controller.
service:
  type: NodePort
  nodePort: 30300   # http://localhost:30300

# Give the pod slightly more memory – Metabase JVM needs it on startup.
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
