auth:
  postgresPassword: "localdev"
  username: "srcuser"
  password: "localdev"
  database: "sourcedb"

primary:
  persistence:
    enabled: false   # no PVC needed on local

  # Enable logical WAL replication — required for Debezium CDC
  extendedConfiguration: |
    wal_level = logical
    max_replication_slots = 5
    max_wal_senders = 5

  # Create a dedicated replication user and publication at first boot
  initdb:
    scripts:
      00_replication_setup.sql: |
        CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD 'replicatorpass';
        GRANT CONNECT ON DATABASE sourcedb TO replicator;
        GRANT USAGE ON SCHEMA public TO replicator;
        GRANT SELECT ON ALL TABLES IN SCHEMA public TO replicator;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO replicator;

resources:
  requests:
    cpu: 100m
    memory: 256Mi
