name: Publish sf-cdc-producer image

on:
  push:
    branches:
      - main
    paths:
      - 'services/sf-cdc-producer/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/sf-cdc-producer
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sf-cdc-producer:latest
            ghcr.io/${{ github.repository_owner }}/sf-cdc-producer:${{ github.sha }}
