apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql-source
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: ghcr.io/imdineshsandaru
      chart: postgresql
      targetRevision: "18.6.2"
      helm:
        valueFiles:
          - $values/envs/local/postgresql-source/values.yaml
    - repoURL: https://github.com/imdineshsandaru/k8s-deployments
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: postgresql-source
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true