apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-service-local
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: ghcr.io/YOUR_ORG
      chart: example-service
      targetRevision: "0.1.0"
    - repoURL: https://github.com/YOUR_ORG/YOUR_REPO
      targetRevision: HEAD
      ref: values
  source:
    repoURL: ghcr.io/YOUR_ORG
    chart: example-service
    targetRevision: "0.1.0"
    helm:
      valueFiles:
        - $values/envs/local/example-service/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: example-service-local
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
