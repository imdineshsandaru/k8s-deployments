apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app-local
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/imdineshsandaru/k8s-deployments
    targetRevision: HEAD
    path: argocd/local/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
